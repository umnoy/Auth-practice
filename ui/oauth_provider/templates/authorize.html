<!DOCTYPE html>
<html>
<head>
  <title>Sign in to GitHub</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/oauth.css') }}">
</head>
<body>
  <div class="logo">🐙</div>

  <div class="login-card">
    <h1>Sign in to GitHub</h1>

    <div class="mock-badge">Mock OAuth Provider (CTF Lab)</div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/authorize">
      <input type="hidden" name="client_id" value="{{ client_id }}">
      <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
      <input type="hidden" name="scope" value="{{ scope }}">

      <label for="username">Username or email address</label>
      <input type="text" name="username" id="username" autocomplete="username" autofocus>

      <label for="password">Password</label>
      <input type="password" name="password" id="password" autocomplete="current-password">

      <button type="submit" class="btn-login">Sign in</button>
    </form>
  </div>

  <div class="app-info">
    Signing in will authorize <span class="app-name">SecureVault</span><br>
    and redirect to: <br><small>{{ redirect_uri }}</small>
    <br><br>New here? <a href="/register?client_id={{ client_id }}&redirect_uri={{ redirect_uri }}&scope={{ scope }}" style="color:#58a6ff;">Create an account</a>
  </div>
</body>
</html>
